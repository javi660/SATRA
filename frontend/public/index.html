<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="SATRA - Sistema de Alerta Temprana de Riesgo Académico - Corporación Universitaria Latinoamericana">
  <meta name="theme-color" content="#1e2532">
  <title>SATRA | CUL</title>

  <!-- Favicon inline -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/main.css">

  <!-- Prevenir FOUC: aplicar tema antes de renderizar -->
  <script>
    (function() {
      try {
        const u = JSON.parse(localStorage.getItem('satra_usuario') || '{}');
        if (u.tema === 'oscuro') document.documentElement.setAttribute('data-theme', 'oscuro');
        if (u.tamano_texto) document.documentElement.setAttribute('data-text-size', u.tamano_texto);
      } catch(e) {}
    })();
  </script>
</head>
<body>

  <!-- Loading inicial -->
  <div class="loading-overlay" id="initial-loader">
    <img src="/assets/logo.png" alt="SATRA" onerror="this.style.display='none'">
    <div class="spinner spinner-dark"></div>
  </div>

  <!-- Scripts - orden importa -->

  <!-- Utilidades base -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/realtime.js"></script>
  <script src="/js/router.js"></script>

  <!-- Páginas -->
  <script src="/js/pages/login.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/clases.js"></script>
  <script src="/js/pages/tareas.js"></script>
  <script src="/js/pages/otros.js"></script>

  <!-- Bootstrap -->
  <script src="/js/app.js"></script>

  <!-- Quitar loader cuando todo carga -->
  <script>
    window.addEventListener('load', () => {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        loader.style.opacity = '0';
        loader.style.transition = 'opacity 0.3s';
        setTimeout(() => loader.remove(), 300);
      }
    });
  </script>
</body>
</html>
